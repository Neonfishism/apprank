name: App排名异动监控

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# 允许写入仓库（提交快照）
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install

      - name: Run monitor
        run: pnpm start

      - name: Commit snapshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add snapshots/
          git diff --cached --quiet || git commit -m "snapshot $(date +%Y-%m-%d)"
          git push
