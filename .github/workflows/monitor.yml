name: App排名异动监控

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 允许写入仓库（提交快照）
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install

      - name: Setup env
        run: |
          echo "FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK_URL }}" > .env.local
          echo "STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}" >> .env.local
          echo "FEISHU_SECRET=${{ secrets.FEISHU_SECRET }}" >> .env.local

      - name: Run monitor
        run: pnpm start
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}

      - name: Commit snapshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add snapshots/
          git diff --cached --quiet || git commit -m "snapshot $(date +%Y-%m-%d)"
          git push
